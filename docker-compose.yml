services:
  postgres:
    image: postgres:16
    container_name: northwind_pg
    environment:
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_DB: ${PGDATABASE}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data:/data
      - ./sql:/sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U northwind -d northwind"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:


