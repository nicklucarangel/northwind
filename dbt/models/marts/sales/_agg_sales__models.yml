version: 2

models:
  - name: agg_sales_monthly
    columns:
      - name: month_start_date
        tests:
          - not_null
          - unique

  - name: agg_sales_by_category
    columns:
      - name: category_id
        tests:
          - not_null
          - unique
      - name: category_name
        tests:
          - not_null

  - name: agg_sales_by_product
    columns:
      - name: product_id
        tests:
          - not_null
          - unique
      - name: product_name
        tests:
          - not_null

  - name: agg_shipping_performance
    columns:
      - name: shipper_id
        tests:
          - not_null
          - unique
      - name: avg_days_to_ship
        tests:
          - not_null
      - name: on_time_delivery_rate
        tests:
          - not_null