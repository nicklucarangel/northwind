version: 2

models:
  - name: fct_order_lines
    columns:
      - name: order_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: net_item_revenue
        tests:
          - not_null

  - name: fct_orders
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
      - name: net_order_revenue
        tests:
          - not_null