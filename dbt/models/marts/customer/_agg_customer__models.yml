version: 2

models:
  - name: agg_customer_behavior
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
      - name: total_orders
        tests:
          - not_null
      - name: total_revenue
        tests:
          - not_null
      - name: last_order_date
        tests:
          - not_null

  - name: agg_customer_churn_risk
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
      - name: days_since_last_order
        tests:
          - not_null
      - name: churn_risk_status
        tests:
          - not_null
          - accepted_values:
              values: ['Active', 'Attention', 'At Risk', 'Churned']