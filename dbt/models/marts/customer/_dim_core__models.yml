version: 2

models:
  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: dim_products
    columns:
      - name: product_id
        tests:
          - not_null
          - unique
      - name: category_id
        tests:
          - not_null
      - name: supplier_id
        tests:
          - not_null

  - name: dim_employees
    columns:
      - name: employee_id
        tests:
          - not_null
          - unique

  - name: dim_shippers
    columns:
      - name: shipper_id
        tests:
          - not_null
          - unique