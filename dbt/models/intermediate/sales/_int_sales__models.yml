version: 2

models:
  - name: int_sales__order_lines
    columns:
      - name: order_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: gross_item_revenue
        tests:
          - not_null
      - name: net_item_revenue
        tests:
          - not_null

  - name: int_sales__orders_enriched
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
      - name: net_order_revenue
        tests:
          - not_null